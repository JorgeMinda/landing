version: '3.9'

services:
  jorgeminda:
  image: docker pull ghcr.io/jorgeminda/landing:1.0.0
  networks:
    traefik-public
  deploy:
    replicas:1
  labels:
        - "traefik.enable=true"
        - "traefik.http.routers.jorgeminda.entrypoints=http"
        - "traefik.http.routers.jorgeminda.rule=Host(jorgeminda.byronrm.com)"
        - "traefik.http.middlewares.jorgeminda-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.jorgeminda.middlewares=jorgeminda-https-redirect"
        - "traefik.http.routers.jorgeminda-secure.entrypoints=https"
        - "traefik.http.routers.tjorgeminda-secure.rule=Host(jorgeminda.byronrm.com)"
        - "traefik.http.routers.jorgeminda-secure.tls=true"
        - "traefik.http.routers.jorgeminda-secure.tls.certresolver=http"
        - "traefik.http.routers.jorgeminda-secure.service=jorgeminda"
        - "traefik.http.services.jorgeminda.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"
    
  networks: 
     traefik-public
      external:true